<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0D1117"/>

  <!-- Subtle radial glow top-left -->
  <radialGradient id="glow" cx="20%" cy="30%" r="55%">
    <stop offset="0%" stop-color="#00D9FF" stop-opacity="0.07"/>
    <stop offset="100%" stop-color="#0D1117" stop-opacity="0"/>
  </radialGradient>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Top-left border accent -->
  <line x1="60" y1="60" x2="200" y2="60" stroke="#00D9FF" stroke-width="1.5" opacity="0.4"/>
  <line x1="60" y1="60" x2="60" y2="160" stroke="#00D9FF" stroke-width="1.5" opacity="0.4"/>

  <!-- Bottom-right border accent -->
  <line x1="1000" y1="570" x2="1140" y2="570" stroke="#00D9FF" stroke-width="1.5" opacity="0.4"/>
  <line x1="1140" y1="470" x2="1140" y2="570" stroke="#00D9FF" stroke-width="1.5" opacity="0.4"/>

  <!-- SM Logo (same paths, scaled to ~140px tall, positioned top-right) -->
  <!--
    Original viewBox 0 0 178 98. Content x:22-154 (w=132), y:20-91 (h=71).
    Target: 180px wide. Scale = 180/132 = 1.364
    tx = 960 - 22*1.364 = 960 - 30 = 930
    ty = 80 - 20*1.364 = 80 - 27.3 = 52.7
  -->
  <g transform="translate(930, 52.7) scale(1.364)"
     stroke="#00D9FF" stroke-linecap="round" fill="none" opacity="0.9">
    <path d="M 68 20 C 28 20 22 30 22 40 C 22 52 68 56 68 68 C 68 80 22 80 22 76" stroke-width="5"/>
    <path d="M 90 80 L 90 20 L 122 52 L 154 20 L 154 80" stroke-width="5" stroke-linejoin="round"/>
    <line x1="22" y1="91" x2="154" y2="91" stroke-width="1.5" opacity="0.4"/>
  </g>

  <!-- Main name -->
  <text x="60" y="290"
        font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
        font-size="88"
        font-weight="800"
        letter-spacing="-2"
        fill="#F0F6FC">SACHIN MACWAN</text>

  <!-- Title -->
  <text x="60" y="370"
        font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
        font-size="32"
        font-weight="400"
        letter-spacing="1"
        fill="#7D8590">Full-Stack Engineer</text>

  <!-- Divider -->
  <line x1="60" y1="410" x2="400" y2="410" stroke="#21262D" stroke-width="1"/>

  <!-- Company + location line -->
  <text x="60" y="450"
        font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
        font-size="24"
        font-weight="500"
        fill="#00D9FF">Pay.com.au</text>
  <text x="200" y="450"
        font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
        font-size="24"
        font-weight="400"
        fill="#7D8590"> · Melbourne, AU</text>

  <!-- URL -->
  <text x="60" y="570"
        font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
        font-size="20"
        font-weight="400"
        fill="#444D56">sachinmacwan.com</text>
</svg>
